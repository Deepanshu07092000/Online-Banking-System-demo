<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Accounts - MyBank</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-gold: #ffb800;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --card-glass: rgba(255, 255, 255, 0.05);
            --balance-green: #00ff88;
            --error-red: #ff4b2b;
        }

        /* BACKGROUND ANIMATION */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.08);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-1000px) scale(1.3); opacity: 0; }
        }

        /* MAIN LAYOUT */
        .account-card {
            position: relative;
            z-index: 2;
            background: var(--card-glass);
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h1 { text-align: center; font-size: 32px; margin-bottom: 30px; letter-spacing: 1px; color: var(--accent-gold); }

        /* TABLE STYLING */
        .table-container { overflow-x: auto; margin-bottom: 30px; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            background: rgba(255, 184, 0, 0.1);
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        th, td { padding: 18px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        tbody tr { transition: all 0.3s ease; }
        tbody tr:hover { background: rgba(255, 255, 255, 0.05); }

        .acc-number {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .balance {
            color: var(--balance-green);
            font-weight: bold;
        }

        .timestamp {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .page-btn.active, .page-btn:hover {
            background: var(--accent-gold);
            color: black;
            border-color: var(--accent-gold);
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            align-items: center;
        }

        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--accent-gold); }

        .logout-btn {
            background: var(--error-red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover { background: #d32f2f; }

    </style>
</head>
<body>

<div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="account-card">
    <h1>All Bank Accounts</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>User Name</th>
                    <th>Email</th>
                    <th>Type</th>
                    <th>Account No</th>
                    <th>Available Balance</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="account, iter : ${accounts}">
                    <td th:text="${iter.count}">1</td>
                    <td th:text="${account.user.name}">John Doe</td>
                    <td th:text="${account.user.email}">john@example.com</td>
                    <td th:text="${account.accountType}">Savings</td>
                    
                    <td class="acc-number" 
                        th:text="${'XXXXXXX' + #strings.substring(account.accountNumber, account.accountNumber.length() - 4)}">
                        XXXXXXX8901
                    </td>
                    
                    <td class="balance" th:text="'₹ ' + ${#numbers.formatDecimal(account.availableBalance, 1, 2)}">₹ 0.00</td>
                    
                    <td class="timestamp">
                        <div th:text="${#temporals.format(account.createdAt, 'dd MMM yyyy')}">07 Sept 2000</div>
                        <div style="font-size: 11px;" th:text="${#temporals.format(account.createdAt, 'HH:mm:ss')}">12:40:10</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn">Prev</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">Next</button>
    </div>

    <div class="footer-actions">
        <a href="/api/admin/admin-dashboard" class="back-link">← Back to Dashboard</a>
        <form action="/logout" method="POST">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</div>

</body>
</html>
