<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Transaction Audit - MyBank</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-gold: #ffb800;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --card-glass: rgba(255, 255, 255, 0.05);
            --success-green: #00ff88;
            --error-red: #ff4b2b;
            --transfer-blue: #00d4ff;
        }

        /* BACKGROUND ANIMATION */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.08);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-1000px) scale(1.3); opacity: 0; }
        }

        /* MAIN LAYOUT */
        .history-card {
            position: relative;
            z-index: 2;
            background: var(--card-glass);
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h1 { text-align: center; font-size: 32px; margin-bottom: 30px; letter-spacing: 1px; color: var(--accent-gold); }

        /* FILTER AREA */
        .filter-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 184, 0, 0.1);
        }

        .filter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }
        
        label { font-size: 12px; color: var(--accent-gold); text-transform: uppercase; font-weight: bold; }

        input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-gold); background: rgba(255, 255, 255, 0.1); }

        .search-btn {
            background: var(--accent-gold);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover { background: #e6a600; transform: translateY(-2px); }

        /* TABLE STYLING */
        .table-container { overflow-x: auto; margin-bottom: 30px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        thead tr {
            background: rgba(255, 184, 0, 0.15);
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 13px;
        }

        th, td { padding: 18px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        /* TYPE COLORS */
        .amt-deposit { color: var(--success-green); font-weight: bold; }
        .amt-withdraw { color: var(--error-red); font-weight: bold; }
        .amt-transfer { color: var(--transfer-blue); font-weight: bold; }

        .acc-mask { font-family: 'Courier New', monospace; color: var(--text-dim); }

        /* FOOTER ACTIONS */
        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .back-link { color: var(--text-dim); text-decoration: none; transition: 0.3s; }
        .back-link:hover { color: var(--accent-gold); }

        .logout-btn {
            background: var(--error-red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="history-card">
    <h1>All Transactions Audit</h1>

    <div class="filter-section">
        <form th:action="@{/api/admin/admin-viewAllTransactions}" method="get" class="filter-form">
            <div class="filter-group">
                <label>Search Account No</label>
                <input type="text" name="accountNo" placeholder="Enter full account number..." th:value="${param.accountNo}">
            </div>
            <div class="filter-group">
                <label>From Date</label>
                <input type="date" name="fromDate" th:value="${param.fromDate}">
            </div>
            <div class="filter-group">
                <label>To Date</label>
                <input type="date" name="toDate" th:value="${param.toDate}">
            </div>
            <button type="submit" class="search-btn">🔍 Filter Records</button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>From Account</th>
                    <th>To Account</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Date & Time</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tx, iter : ${transactions}">
                    <td th:text="${iter.count}">1</td>

                    <td class="acc-mask">
                        <span th:if="${tx.fromAccount != null}" 
                              th:text="'XXXXXX' + ${#strings.substring(tx.fromAccount.accountNumber, tx.fromAccount.accountNumber.length() - 4)}">
                        </span>
                        <span th:unless="${tx.fromAccount != null}">[INTERNAL/CASH]</span>
                    </td>

                    <td class="acc-mask">
                        <span th:if="${tx.toAccount != null}" 
                              th:text="'XXXXXX' + ${#strings.substring(tx.toAccount.accountNumber, tx.toAccount.accountNumber.length() - 4)}">
                        </span>
                        <span th:unless="${tx.toAccount != null}">[OUTSIDE BANK]</span>
                    </td>
                    
                    <td>
                        <span th:if="${tx.type.name() == 'DEPOSIT'}" class="amt-deposit" th:text="'+ ₹' + ${tx.amount}"></span>
                        <span th:if="${tx.type.name() == 'WITHDRAW'}" class="amt-withdraw" th:text="'- ₹' + ${tx.amount}"></span>
                        <span th:if="${tx.type.name() == 'TRANSFER'}" class="amt-transfer" th:text="'⇄ ₹' + ${tx.amount}"></span>
                    </td>
                    
                    <td th:text="${tx.type}">TRANSFER</td>
                    
                    <td>
                        <span th:text="${#temporals.format(tx.transactionDateandTime, 'dd MMM yyyy')}"></span>
                        <br>
                        <span style="font-size: 11px; color: var(--text-dim);" 
                              th:text="${#temporals.format(tx.transactionDateandTime, 'HH:mm:ss')}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-actions">
        <a href="/api/admin/admin-dashboard" class="back-link">← Back to Admin Home</a>
        <form action="/logout" method="POST">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</div>

</body>
</html>
