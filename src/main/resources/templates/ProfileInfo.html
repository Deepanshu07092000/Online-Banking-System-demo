<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile - MyBank</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-orange: #ffb800;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --border-color: rgba(255, 184, 0, 0.4);
            --error-red: #ff4b2b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
            color: var(--text-main);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* BACKGROUND ANIMATION (REUSED) */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.1);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 15s; }
        .bg-animation span:nth-child(2) { width: 120px; height: 120px; left: 30%; animation-duration: 18s; }
        .bg-animation span:nth-child(3) { width: 60px; height: 60px; left: 50%; animation-duration: 12s; }
        .bg-animation span:nth-child(4) { width: 150px; height: 150px; left: 70%; animation-duration: 22s; }
        .bg-animation span:nth-child(5) { width: 100px; height: 100px; left: 85%; animation-duration: 17s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-1000px) scale(1.2); opacity: 0; }
        }

        /* PROFILE CONTAINER */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
            padding: 45px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin: 20px;
        }

        .profile-title {
            text-align: center;
            font-size: 38px;
            margin-bottom: 40px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        /* INFO GRID SYSTEM */
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }

        .label {
            font-size: 16px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .value {
            font-size: 18px;
            color: var(--accent-orange);
            font-weight: 600;
            text-align: right;
        }

        /* BUTTONS */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            border: none;
        }

        .btn-change-pw {
            background: var(--accent-orange);
            color: #000;
        }

        .btn-logout {
            background: transparent;
            color: var(--error-red);
            border: 1px solid var(--error-red);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .btn-change-pw:hover {
            background: #e5a500;
        }

        .btn-logout:hover {
            background: var(--error-red);
            color: white;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container { padding: 30px; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .value { text-align: left; }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="container">
        <h1 class="profile-title">Profile Info</h1>

        <div class="info-section">
            <div class="info-row">
                <span class="label">UserName-:</span>
                <span class="value" th:text="${user.name}">Deepanshu</span>
            </div>
            <div class="info-row">
                <span class="label">Email-:</span>
                <span class="value" th:text="${user.email}">deepanshu@example.com</span>
            </div>
            <div class="info-row">
                <span class="label">Gender-:</span>
                <span class="value" th:text="${user.gender}">Male</span>
            </div>
            <div class="info-row">
                <span class="label">DOB-:</span>
                <span class="value" th:text="${user.dateOfBirth}">15-08-1998</span>
            </div>
            <div class="info-row">
                <span class="label">Account No-:</span>
                <span class="value" th:text="${account.accountNumber}">1234567890</span>
            </div>
            <div class="info-row">
                <span class="label">Available Balance-:</span>
                <span class="value">₹<span th:text="${account.availableBalance}">25,000</span></span>
            </div>
            <div class="info-row">
                <span class="label">PAN NO-:</span>
                <span class="value" th:text="${user.panNumber}">ABCDE1234F</span>
            </div>
            <div class="info-row">
                <span class="label">Aadhar No-:</span>
                <span class="value" th:text="${user.aadharNumber}">XXXX-XXXX-1234</span>
            </div>
            <div class="info-row">
                <span class="label">Last Login-:</span>
				<span class="value"
				      th:text="${#temporals.format(lastLogin, 'dd MMM yyyy, hh:mm a')}">
				</span>
            </div>
        </div>

        <div class="btn-container">
            <a href="/api/auth/change-password" class="btn btn-change-pw">Change Password</a>
            <form action="/logout" method="post" style="width: 100%;">
                <button type="submit" class="btn btn-logout" style="width: 100%;">Logout</button>
            </form>
        </div>
    </div>

</body>
</html>
