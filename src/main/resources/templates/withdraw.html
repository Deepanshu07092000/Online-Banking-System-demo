<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - MyBank</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-gold: #ffb800;
            --border-color: rgba(255, 184, 0, 0.3);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --card-glass: rgba(255, 255, 255, 0.05);
            --success-green: #00ff88;
            --error-red: #ff4b2b;
        }

        /* ANIMATED BACKGROUND */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING SPHERES */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.12);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 15s; }
        .bg-animation span:nth-child(2) { width: 120px; height: 120px; left: 30%; animation-duration: 18s; }
        .bg-animation span:nth-child(3) { width: 60px; height: 60px; left: 50%; animation-duration: 12s; }
        .bg-animation span:nth-child(4) { width: 150px; height: 150px; left: 70%; animation-duration: 22s; }
        .bg-animation span:nth-child(5) { width: 100px; height: 100px; left: 85%; animation-duration: 17s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-1000px) scale(1.3); opacity: 0; }
        }

        .form-card {
            position: relative;
            z-index: 2;
            background-color: var(--card-glass);
            width: 100%;
            max-width: 450px;
            padding: 45px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            margin: 20px;
        }

        h1 { text-align: center; font-size: 36px; margin-bottom: 5px; font-weight: 700; }
        .page-subtitle { text-align: center; color: var(--text-dim); margin-bottom: 35px; font-size: 0.9rem; letter-spacing: 0.5px; }

        /* ALERT STYLES */
        .alert {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }
        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success-green);
            border: 1px solid var(--success-green);
        }
        .alert-danger {
            background: rgba(255, 75, 43, 0.1);
            color: var(--error-red);
            border: 1px solid var(--error-red);
        }

        .form-group { margin-bottom: 25px; }
        
        .label { 
            display: block; 
            font-weight: 500; 
            color: var(--text-dim); 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px; 
        }

        .account-display {
            background: rgba(255, 184, 0, 0.08);
            color: var(--accent-gold);
            padding: 16px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            border: 1px dashed var(--border-color);
            display: block;
            text-align: center;
        }

        input[type="number"] {
            background-color: rgba(0, 0, 0, 0.4);
            color: white;
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 10px;
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: var(--accent-gold);
            background-color: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 15px rgba(255, 184, 0, 0.15);
        }

        /* REMOVE ARROWS */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .submit-btn {
            background-color: var(--accent-gold);
            color: black;
            border: none;
            padding: 16px;
            width: 100%;
            font-weight: 800;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #ffcc00;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 184, 0, 0.25);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--accent-gold); }
    </style>
</head>
<body>

<div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="form-card">
    <h1>Withdraw</h1>
    <p class="page-subtitle">Securely withdraw funds from your account</p>

    <div th:if="${success}" th:text="${success}" class="alert alert-success">
    </div>

    <div th:if="${error}" th:text="${error}" class="alert alert-danger">
    </div>

    <form action="/api/transaction/withdraw" method="POST">
        <div class="form-group">
            <span class="label">Linked Account Number</span>
            <input type="hidden" name="accountNumber" th:value="${account.accountNumber}">
            <span class="account-display" th:text="${account.accountNumber}">XXXXXXXXXX</span>
        </div>

        <div class="form-group">
            <label for="amount" class="label">Withdraw Amount (₹)</label>
            <input type="number" id="amount" name="amount" required placeholder="Enter amount to withdraw" min="1" step="any">
        </div>

        <button type="submit" class="submit-btn">Withdraw Money</button>
        
        <a href="/api/auth/dashboard" class="back-link">Cancel and Return</a>
    </form>
</div>

<script th:if="${success}">
    setTimeout(function() {
        // Redirects to dashboard after 3 seconds on success
        window.location.href = "/api/auth/dashboard";
    }, 3000); 
</script>

</body>
</html>
