<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - MyBank</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-gold: #ffb800;
            --border-color: rgba(255, 184, 0, 0.3);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --card-glass: rgba(255, 255, 255, 0.05);
            --success-green: #00ff88;
            --error-red: #ff4b2b;
        }

        /* HIGH-END ANIMATED BACKGROUND */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING SPHERES */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.12);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 15s; }
        .bg-animation span:nth-child(2) { width: 120px; height: 120px; left: 30%; animation-duration: 18s; }
        .bg-animation span:nth-child(3) { width: 60px; height: 60px; left: 50%; animation-duration: 12s; }
        .bg-animation span:nth-child(4) { width: 150px; height: 150px; left: 70%; animation-duration: 22s; }
        .bg-animation span:nth-child(5) { width: 100px; height: 100px; left: 85%; animation-duration: 17s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-1000px) scale(1.3); opacity: 0; }
        }

        .form-card {
            position: relative;
            z-index: 2;
            background-color: var(--card-glass);
            width: 100%;
            max-width: 500px;
            padding: 45px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin: 20px;
        }

        h1 { text-align: center; font-size: 32px; margin-bottom: 10px; letter-spacing: 1px; }
        .page-subtitle { text-align: center; color: var(--text-dim); margin-bottom: 35px; font-size: 0.95rem; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: 500; color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }

        input[type="password"] {
            background-color: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            border-color: var(--accent-gold);
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(255, 184, 0, 0.2);
        }

        /* ALERT STYLES */
        .alert {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success-green);
            border: 1px solid var(--success-green);
        }

        .alert-danger {
            background: rgba(255, 75, 43, 0.1);
            color: var(--error-red);
            border: 1px solid var(--error-red);
        }

        .submit-btn {
            background-color: var(--accent-gold);
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #ffcc00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 184, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="form-card">
    <h1>Security</h1>
    <p class="page-subtitle">Update your account password</p>

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${errorSame}" class="alert alert-danger">
        same password cannot be taken
    </div>

    <div th:if="${errorMismatch}" class="alert alert-danger">
        entered password doesnot matches
    </div>

    <form action="/api/auth/update-password" method="POST">
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="currentPassword" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="newPassword" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>Retype New Password</label>
            <input type="password" name="confirmPassword" required placeholder="••••••••">
        </div>

        <div class="submit-container">
            <button type="submit" class="submit-btn">Change Password</button>
        </div>
    </form>
</div>

<script th:if="${success}">
    setTimeout(function() {
        window.location.href = "/api/auth/do-login";
    }, 3000); 
</script>

</body>
</html>
