<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login History - MyBank</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-gold: #ffb800;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --card-glass: rgba(255, 255, 255, 0.05);
            --success-green: #00ff88;
            --error-red: #ff4b2b;
        }

        /* BACKGROUND ANIMATION */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.08);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-1000px) scale(1.3); opacity: 0; }
        }

        /* MAIN LAYOUT */
        .history-card {
            position: relative;
            z-index: 2;
            background: var(--card-glass);
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h1 { text-align: center; font-size: 32px; margin-bottom: 30px; letter-spacing: 1px; color: var(--accent-gold); }

        /* FILTER SECTION */
        .filter-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 184, 0, 0.1);
        }

        .filter-form {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { font-size: 13px; color: var(--accent-gold); text-transform: uppercase; }

        input[type="date"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
        }

        .filter-btn {
            background: var(--accent-gold);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            height: 40px;
        }

        .filter-btn:hover { background: #e6a600; transform: scale(1.05); }

        /* TABLE STYLING */
        .table-container { overflow-x: auto; margin-bottom: 30px; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            background: rgba(255, 184, 0, 0.1);
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 13px;
        }

        th, td { padding: 18px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .time-text { font-weight: 600; }
        .date-text { color: var(--text-dim); font-size: 12px; }

        .active-session {
            color: var(--success-green);
            font-style: italic;
            font-size: 13px;
        }

        /* PAGINATION & FOOTER */
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .page-btn {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main); padding: 8px 15px; border-radius: 5px; cursor: pointer;
        }
        .page-btn.active { background: var(--accent-gold); color: black; }

        .footer-actions { display: flex; justify-content: space-between; margin-top: 30px; align-items: center; }
        .back-link { color: var(--text-dim); text-decoration: none; transition: 0.3s; }
        .back-link:hover { color: var(--accent-gold); }

        .logout-btn { background: var(--error-red); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="history-card">
    <h1>Login History Logs</h1>

    <div class="filter-container">
        <form th:action="@{/api/admin/admin-login-history}" method="get" class="filter-form">
            <div class="input-group">
                <label>From Date</label>
                <input type="date" name="fromDate" th:value="${fromDate}">
            </div>
            <div class="input-group">
                <label>To Date</label>
                <input type="date" name="toDate" th:value="${toDate}">
            </div>
            <button type="submit" class="filter-btn">Apply Filter</button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Serial No</th>
                    <th>User Name</th>
                    <th>Login (Date & Time)</th>
                    <th>Logout (Date & Time)</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="history, iter : ${loginHistories}">
                    <td th:text="${iter.count}">1</td>
                    <td th:text="${history.user.name}" style="font-weight: bold;">Deepanshu</td>
                    
                    <td>
                        <div class="date-text" th:text="${#temporals.format(history.loginTime, 'dd MMM yyyy')}">07 Sept 2000</div>
                        <div class="time-text" th:text="${#temporals.format(history.loginTime, 'HH:mm:ss')}">12:40:10</div>
                    </td>

                    <td>
                        <div th:if="${history.logoutTime != null}">
                            <div class="date-text" th:text="${#temporals.format(history.logoutTime, 'dd MMM yyyy')}">07 Sept 2000</div>
                            <div class="time-text" th:text="${#temporals.format(history.logoutTime, 'HH:mm:ss')}">12:40:10</div>
                        </div>
                        <div th:unless="${history.logoutTime != null}" class="active-session">
                            ● Active Session
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn">Prev</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">Next</button>
    </div>

    <div class="footer-actions">
        <a href="/api/admin/admin-dashboard" class="back-link">← Back to Dashboard</a>
        <form action="/logout" method="POST">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</div>

</body>
</html>
