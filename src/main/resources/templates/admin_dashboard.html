<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - MyBank Portal</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-gold: #ffb800;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --border-color: rgba(255, 184, 0, 0.4);
            --error-red: #ff4b2b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
            color: var(--text-main);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* BACKGROUND ANIMATION */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.1);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 15s; }
        .bg-animation span:nth-child(2) { width: 120px; height: 120px; left: 30%; animation-duration: 18s; }
        .bg-animation span:nth-child(3) { width: 60px; height: 60px; left: 50%; animation-duration: 12s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-1000px) scale(1.2); opacity: 0; }
        }

        /* DASHBOARD CONTAINER */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            padding: 45px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .header-section {
            text-align: left;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 { 
            margin: 0; 
            font-size: 32px; 
            color: var(--text-main); 
            letter-spacing: 1px;
        }

        .admin-info { 
            color: var(--accent-gold); 
            font-size: 16px; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ADMIN ACTION LIST */
        .admin-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* BUTTON STYLING */
        .btn {
            padding: 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .btn-gold {
            background: var(--accent-gold);
            color: #000;
            border: none;
        }

        .btn-gold:hover {
            background: #ffcc00;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 184, 0, 0.3);
        }

        .btn-logout {
            background: transparent;
            color: var(--error-red);
            border: 1px solid var(--error-red);
            margin-top: 20px;
        }

        .btn-logout:hover {
            background: var(--error-red);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3);
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <span></span><span></span><span></span>
    </div>

    <div class="container">
        <div class="header-section">
            <h1>Welcome, Admin</h1>
            <div class="admin-info">Email: <span th:text="${admin.email}">admin@mybank.com</span></div>
        </div>

        <div class="admin-actions">
            <a href="/api/admin/admin-users" class="btn btn-gold">View All Users</a>

            <a href="/api/admin/admin-viewAllTransactions" class="btn btn-gold">View All Transactions</a>

            <a href="/api/admin/admin-accounts" class="btn btn-gold">View All Accounts</a>

            <a href="/api/admin/admin-login-history" class="btn btn-gold">View Login History</a>

            <form action="/logout" method="post">
                <button type="submit" class="btn btn-logout" style="width: 100%;">Logout</button>
            </form>
        </div>
    </div>

</body>
</html>
