<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Secure Staff Access</title>
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --accent-gold: #ffb800;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --input-bg: rgba(0, 0, 0, 0.5);
            --border-gold: rgba(255, 184, 0, 0.3);
        }

        /* DYNAMIC BACKGROUND ANIMATION */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            background: linear-gradient(270deg, #0d0d0d, #1a1a1a, #000000);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.12);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 15s; }
        .bg-animation span:nth-child(2) { width: 120px; height: 120px; left: 30%; animation-duration: 18s; }
        .bg-animation span:nth-child(3) { width: 60px; height: 60px; left: 50%; animation-duration: 12s; }
        .bg-animation span:nth-child(4) { width: 150px; height: 150px; left: 70%; animation-duration: 22s; }
        .bg-animation span:nth-child(5) { width: 100px; height: 100px; left: 85%; animation-duration: 17s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-1000px) scale(1.3); opacity: 0; }
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: var(--glass-bg);
            border-radius: 20px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .bank-logo {
            width: 65px;
            height: 65px;
            fill: var(--accent-gold);
            filter: drop-shadow(0 0 10px rgba(255, 184, 0, 0.4));
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--accent-gold);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
            display: block;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid var(--border-gold);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 15px rgba(255, 184, 0, 0.2);
        }

        .login-btn {
            width: 100%;
            background: var(--accent-gold);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #ffcc00;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 184, 0, 0.4);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent-gold);
        }

        @media (max-width: 480px) {
            .login-card { padding: 40px 25px; margin: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="login-card">
        <div class="logo-container">
            <svg class="bank-logo" viewBox="0 0 24 24">
                <path d="M11.5 1L2 6v2h19V6l-9.5-5zM2 22h19v-3H2v3zm4-13v7h3V9H6zm5 0v7h3V9h-3zm5 0v7h3V9h-3z"/>
            </svg>
        </div>

        <h1>Staff & Management Portal</h1>
        <span class="subtitle">Secure Internal Access Only</span>
		
		<div th:if="${error}" style="color:red; margin-bottom:10px;">
		    <p th:text="${error}"></p>
		</div>
		
        <form action="/api/admin/admin-login" method="POST">
            <div class="input-group">
                <label>Admin Username</label>
                <input type="text" name="username" placeholder="Enter admin username" required>
            </div>
			
            <div class="input-group">
                <label>Admin Email</label>
                <input type="text" name="email" placeholder="Enter work email" required>
            </div>

            <div class="input-group">
                <label>Security Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Authenticate & Enter</button>
        </form>

        <a href="/api/auth/do-login" class="back-link">← Back to Customer Login</a>
    </div>

</body>
</html>
